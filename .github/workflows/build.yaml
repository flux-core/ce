name: Build Cheat Engine Full Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. 安装 Lazarus
    - name: Install Lazarus via Choco
      run: |
        choco install lazarus --version=2.2.6 -y --no-progress
        echo "C:\lazarus" >> $env:GITHUB_PATH

    # 2. 拉取源码
    - name: Clone Cheat Engine Source
      run: |
        git clone https://github.com/cheat-engine/cheat-engine.git

    # 3. 编译主程序
    - name: Build Main EXE
      run: |
        cd cheat-engine/"Cheat Engine"
        & "C:\lazarus\lazbuild.exe" cheatengine.lpi --build-mode="Release 64-bit"

    # 4. 精准复制：从【根目录】将运行所需的资源文件全数拷贝至 bin 目录中
    - name: Copy Required Resource Folders
      run: |
        cd cheat-engine
        # 复制根目录下的 autorun、languages、lua 文件夹到 bin 目录
        xcopy /E /I /Y "autorun" "Cheat Engine\bin\autorun"
        xcopy /E /I /Y "languages" "Cheat Engine\bin\languages"
        xcopy /E /I /Y "lua" "Cheat Engine\bin\lua"
        # 复制最新仓库中存放 xmlSimple.dll 等核心组件的 clibs 文件夹
        xcopy /E /I /Y "clibs64" "Cheat Engine\bin\clibs64"
        xcopy /E /I /Y "clibs32" "Cheat Engine\bin\clibs32"

    # 5. 上传完整包
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cheat-Engine-Perfect-Edition
        path: cheat-engine/Cheat Engine/bin/
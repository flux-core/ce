name: Build Cheat Engine

on:
  workflow_dispatch: # 允许你手动点击按钮触发编译

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. 使用 Windows 官方包管理器 choco 安装 lazarus (绝对不会下载损坏)
    - name: Install Lazarus via Choco
      run: |
        choco install lazarus --version=2.2.6 -y --no-progress
        # 强制让当前终端刷新一下刚安装好的环境变量
        echo "C:\lazarus" >> $env:GITHUB_PATH

    # 2. 拉取 Cheat Engine 的官方最新源码
    - name: Clone Cheat Engine Source
      run: |
        git clone https://github.com/cheat-engine/cheat-engine.git

    # 3. 编译主程序（有了 choco，直接调用 lazbuild 即可，无需绝对路径）
    - name: Build with Lazarus
      run: |
        cd cheat-engine/"Cheat Engine"
        lazbuild cheatengine.lpi --build-mode="Release 64-bit"

    # 4. 将编译好的 exe 文件夹上传到 GitHub Artifacts 供你下载
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cheat-Engine-Clean-Build
        path: cheat-engine/Cheat Engine/bin/
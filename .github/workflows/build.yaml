name: Build Cheat Engine Full Package

on:
  workflow_dispatch: # 手动一键触发

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. 使用官方 choco 安全安装 Lazarus 编译环境
    - name: Install Lazarus via Choco
      run: |
        choco install lazarus --version=2.2.6 -y --no-progress
        echo "C:\lazarus" >> $env:GITHUB_PATH

    # 2. 配置 Visual Studio 的命令行编译环境（MSBuild）
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # 3. 拉取 Cheat Engine 官方最新源码
    - name: Clone Cheat Engine Source
      run: |
        git clone https://github.com/cheat-engine/cheat-engine.git

    # 4. 自动修复：用 *.vcxproj 模糊匹配，彻底解决大小写导致找不到文件的问题
    - name: Fix Solution and Project Files
      run: |
        cd cheat-engine/"Cheat Engine"/MonoDataCollector
        (Get-Content *.vcxproj) -replace '<PlatformToolset>v141_xp</PlatformToolset>', '<PlatformToolset>v143</PlatformToolset>' | Set-Content *.vcxproj
        (Get-Content *.vcxproj) -replace '<CharacterSet>Unicode</CharacterSet>', '<CharacterSet>MultiByte</CharacterSet>' | Set-Content *.vcxproj

    # 5. 编译主程序（64位）
    - name: Build Main EXE
      run: |
        cd cheat-engine/"Cheat Engine"
        & "C:\lazarus\lazbuild.exe" cheatengine.lpi --build-mode="Release 64-bit"

    # 6. 编译注入核心：同样用 *.sln 模糊匹配文件名
    - name: Build Mono Data Collector DLLs
      run: |
        cd cheat-engine/"Cheat Engine"/MonoDataCollector
        msbuild *.sln /p:Configuration=Release /p:Platform=x64 /p:WindowsTargetPlatformVersion=10.0
        msbuild *.sln /p:Configuration=Release /p:Platform=Win32 /p:WindowsTargetPlatformVersion=10.0

    # 7. 打包并上传
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cheat-Engine-Clean-And-Full
        path: cheat-engine/Cheat Engine/bin/
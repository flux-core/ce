name: Build Cheat Engine with DLLs

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. 安装 Lazarus
    - name: Install Lazarus via Choco
      run: |
        choco install lazarus --version=2.2.6 -y --no-progress
        echo "C:\lazarus" >> $env:GITHUB_PATH

    # 2. 设置 Visual Studio 编译环境（用于编译 C++ 的 DLL）
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # 3. 拉取源码
    - name: Clone Cheat Engine Source
      run: |
        git clone https://github.com/cheat-engine/cheat-engine.git

    # 4. 编译 Lazarus 主程序
    - name: Build Main EXE
      run: |
        cd cheat-engine/"Cheat Engine"
        lazbuild cheatengine.lpi --build-mode="Release 64-bit"

    # 5. 编译 Mono 注入所需的 DLL 文件
    - name: Build Mono Data Collector DLLs
      run: |
        cd cheat-engine/"Cheat Engine"/monodatacollector
        msbuild monodatacollector.sln /p:Configuration=Release /p:Platform=x64
        msbuild monodatacollector.sln /p:Configuration=Release /p:Platform=Win32

    # 6. 打包上传（此时 bin 文件夹里就包含 exe 和 dll 了）
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cheat-Engine-With-DLL-Build
        path: cheat-engine/Cheat Engine/bin/
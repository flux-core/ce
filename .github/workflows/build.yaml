name: Build Cheat Engine Full Package

on:
  workflow_dispatch: # 手动一键触发

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. 安全安装 Lazarus
    - name: Install Lazarus via Choco
      run: |
        choco install lazarus --version=2.2.6 -y --no-progress
        echo "C:\lazarus" >> $env:GITHUB_PATH

    # 2. 拉取源码
    - name: Clone Cheat Engine Source
      run: |
        git clone https://github.com/cheat-engine/cheat-engine.git

    # 3. 编译主程序
    - name: Build Main EXE
      run: |
        cd cheat-engine/"Cheat Engine"
        & "C:\lazarus\lazbuild.exe" cheatengine.lpi --build-mode="Release 64-bit"

    # 4. 关键修正：把运行必需的 lua、autorun、languages 等资源文件夹通通复制到 bin 目录里
    - name: Copy Required Resource Folders
      run: |
        cd cheat-engine/"Cheat Engine"
        xcopy /E /I /Y "autorun" "bin\autorun"
        xcopy /E /I /Y "languages" "bin\languages"
        xcopy /E /I /Y "lua" "bin\lua"
        xcopy /E /I /Y "clibs64" "bin\clibs64"
        xcopy /E /I /Y "clibs32" "bin\clibs32"

    # 5. 把包含完整生态的 bin 文件夹上传
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cheat-Engine-Perfect-Edition
        path: cheat-engine/Cheat Engine/bin/